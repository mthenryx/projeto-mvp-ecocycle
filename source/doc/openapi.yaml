  /v1/ecocycle/pontos-coleta/{id}/status:
    patch:
      tags:
        - Pontos de Coleta
      summary: Atualizar o status de um ponto de coleta
      description: Uma cooperativa/coletor cadastrado altera o status de um ponto de coleta entre Pendente, Em Andamento e Finalizado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador único do ponto de coleta
          schema:
            type: integer
          example: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateInput'
            example:
              status: Em Andamento
      responses:
        '200':
          description: Status do ponto de coleta atualizado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/PontoColeta'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 10
                  titulo: Óleo de cozinha usado
                  descricao_do_material: 5 litros de óleo de cozinha usado armazenados em garrafas PET
                  status: Em Andamento
                  id_endereco: 3
                  quantidade_estimada: 5
                  id_doador: 1
                  foto: https://cdn.ecocycle.com/uploads/oleo-cozinha.jpg
                  data_horario: '2026-07-23T14:30:00Z'
                  categorias_residuos:
                    - 4
        '400':
