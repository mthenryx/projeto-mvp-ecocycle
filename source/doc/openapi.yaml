        - bearerAuth: []
      responses:
        '200':
          description: Ponto de coleta removido com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          id:
                            type: integer
