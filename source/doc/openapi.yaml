  /v1/ecocycle/pontos-coleta:
    post:
      tags:
        - Pontos de Coleta
      summary: Cadastrar um novo ponto de coleta
      description: Um usuário Doador cadastra um novo ponto de coleta contendo título, descrição do material, categorias, endereço e quantidade estimada.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PontoColetaInput'
            example:
              titulo: Óleo de cozinha usado
              descricao_do_material: 5 litros de óleo de cozinha usado armazenados em garrafas PET
              id_endereco: 3
              quantidade_estimada: 5
              foto: https://cdn.ecocycle.com/uploads/oleo-cozinha.jpg
              categorias_residuos:
                - 4
      responses:
        '201':
          description: Ponto de coleta cadastrado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/PontoColeta'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 201
                response:
                  id: 10
                  titulo: Óleo de cozinha usado
                  descricao_do_material: 5 litros de óleo de cozinha usado armazenados em garrafas PET
                  status: Pendente
                  id_endereco: 3
                  quantidade_estimada: 5
                  id_doador: 1
                  foto: https://cdn.ecocycle.com/uploads/oleo-cozinha.jpg
                  data_horario: '2026-07-23T14:30:00Z'
                  categorias_residuos:
                    - 4
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Pontos de Coleta
      summary: Listar pontos de coleta disponíveis
      description: Qualquer usuário pode visualizar os pontos de coleta cadastrados, com filtros opcionais por status, categoria e cidade.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          required: false
          description: Filtra pontos de coleta pelo status atual
          schema:
            type: string
            enum:
              - Pendente
              - Em Andamento
              - Finalizado
          example: Pendente
        - name: id_categoria_residuos
          in: query
          required: false
          description: Filtra pontos de coleta por categoria de resíduo
          schema:
            type: integer
          example: 4
        - name: id_cidade
          in: query
          required: false
          description: Filtra pontos de coleta pela cidade do endereço vinculado
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: Lista de pontos de coleta retornada com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          $ref: '#/components/schemas/PontoColeta'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  - id: 10
                    titulo: Óleo de cozinha usado
                    descricao_do_material: 5 litros de óleo de cozinha usado armazenados em garrafas PET
                    status: Pendente
                    id_endereco: 3
                    quantidade_estimada: 5
                    id_doador: 1
                    foto: https://cdn.ecocycle.com/uploads/oleo-cozinha.jpg
                    data_horario: '2026-07-23T14:30:00Z'
                    categorias_residuos:
                      - 4
        '500':
          $ref: '#/components/responses/InternalError'
