              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 10
                  titulo: Óleo de cozinha usado (atualizado)
                  descricao_do_material: 8 litros de óleo de cozinha usado armazenados em garrafas PET
                  status: Pendente
                  id_endereco: 3
                  quantidade_estimada: 8
                  id_doador: 1
                  foto: https://cdn.ecocycle.com/uploads/oleo-cozinha-2.jpg
                  data_horario: '2026-07-23T14:30:00Z'
                  categorias_residuos:
