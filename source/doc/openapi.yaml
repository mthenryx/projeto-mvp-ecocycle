              sigla: SP
      responses:
        '200':
          description: Estado atualizado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Estado'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 1
                  nome_estado: São Paulo
                  sigla: SP
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Estados
      summary: Remover um estado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Estado removido com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          removido:
                            type: boolean
                            example: true
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 1
                  removido: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: Número da página de resultados
      schema:
        type: integer
        default: 1
      example: 1
    LimitParam:
      name: limit
      in: query
      required: false
      description: Quantidade de registros por página
      schema:
        type: integer
        default: 10
      example: 10
  responses:
    BadRequest:
      description: Erro de validação nos dados enviados
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            status_code: 400
            message: Não foi possível processar a requisição devido a erros de entrada de dados.
    Unauthorized:
      description: Usuário não autenticado ou token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            status_code: 401
            message: Não foi possível processar a requisição pois o usuário não está autenticado.
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            status_code: 404
            message: Não foi possível processar a requisição pois o recurso solicitado não foi encontrado.
    InternalError:
      description: Erro interno no servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: false
            status_code: 500
            message: Não foi possível processar a requisição devido a um erro interno no servidor.
  schemas:
    SuccessEnvelopeBase:
      type: object
      required:
        - api_description
        - development
        - version
        - status
        - status_code
        - response
      properties:
        api_description:
          type: string
          example: API para controlar o projeto EcoCycle
        development:
          type: string
          example: Matheus Henry dos Santos
        version:
          type: string
          example: 1.0.7.26
        status:
          type: boolean
          example: true
        status_code:
          type: integer
          example: 200
        response:
          type: object
    ErrorResponse:
      type: object
      required:
        - status
        - status_code
        - message
      properties:
        status:
          type: boolean
          example: false
        status_code:
          type: integer
          example: 400
        message:
          type: string
          example: Não foi possível processar a requisição devido a erros de entrada de dados.
    LoginInput:
      type: object
      required:
        - email
        - senha
        - tipo_perfil
      properties:
        email:
          type: string
          format: email
          example: joao.silva@email.com
        senha:
          type: string
          format: password
          example: SenhaForte123
        tipo_perfil:
          type: string
          enum:
            - doador
            - coletor
          example: doador
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.exemplo
        tipo_perfil:
          type: string
          enum:
            - doador
            - coletor
          example: doador
        usuario:
          type: object
          properties:
            id:
              type: integer
              example: 1
            nome:
              type: string
              example: João da Silva
            email:
              type: string
              format: email
              example: joao.silva@email.com
    DoadorInput:
      type: object
      required:
        - nome
        - email
        - senha
      properties:
        nome:
          type: string
          maxLength: 100
          example: João da Silva
        email:
          type: string
          format: email
          maxLength: 256
          example: joao.silva@email.com
        senha:
          type: string
          format: password
          maxLength: 20
          example: SenhaForte123
    Doador:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: João da Silva
        email:
          type: string
          format: email
          example: joao.silva@email.com
        data_criacao_conta:
          type: string
          format: date
          example: '2026-07-23'
    ColetorInput:
      type: object
      required:
        - nome
        - email
        - senha
      properties:
        nome:
          type: string
          maxLength: 100
          example: Cooperativa Recicla Mais
        email:
          type: string
          format: email
          maxLength: 256
          example: contato@reciclamais.com
        senha:
          type: string
          format: password
          maxLength: 20
          example: SenhaForte123
    Coletor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Cooperativa Recicla Mais
        email:
          type: string
          format: email
          example: contato@reciclamais.com
        data_criacao_conta:
          type: string
          format: date
          example: '2026-07-23'
    PontoColetaInput:
      type: object
      required:
        - titulo
        - descricao_do_material
        - id_endereco
        - quantidade_estimada
        - categorias_residuos
      properties:
        titulo:
          type: string
          maxLength: 35
          example: Óleo de cozinha usado
        descricao_do_material:
          type: string
          maxLength: 100
          example: 5 litros de óleo de cozinha usado armazenados em garrafas PET
        id_endereco:
          type: integer
          example: 3
        quantidade_estimada:
          type: integer
          example: 5
        foto:
          type: string
          maxLength: 2000
          example: https://cdn.ecocycle.com/uploads/oleo-cozinha.jpg
        categorias_residuos:
          type: array
          items:
            type: integer
          example:
            - 4
    PontoColeta:
      type: object
      properties:
        id:
          type: integer
          example: 10
        titulo:
          type: string
          example: Óleo de cozinha usado
        descricao_do_material:
          type: string
          example: 5 litros de óleo de cozinha usado armazenados em garrafas PET
        status:
          type: string
          enum:
            - Pendente
            - Em Andamento
            - Finalizado
          example: Pendente
        id_endereco:
          type: integer
          example: 3
        quantidade_estimada:
          type: integer
          example: 5
        id_doador:
          type: integer
          example: 1
        foto:
          type: string
          example: https://cdn.ecocycle.com/uploads/oleo-cozinha.jpg
        data_horario:
          type: string
          format: date-time
          example: '2026-07-23T14:30:00Z'
        categorias_residuos:
          type: array
          items:
            type: integer
          example:
            - 4
    StatusUpdateInput:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - Pendente
            - Em Andamento
            - Finalizado
          example: Em Andamento
    ColetorPontoColetaInput:
      type: object
      required:
        - id_coletor
      properties:
        id_coletor:
          type: integer
          example: 1
    ColetorPontoColeta:
      type: object
      properties:
        id:
          type: integer
          example: 5
        id_coletor:
          type: integer
          example: 1
        id_ponto_de_coleta:
          type: integer
          example: 10
    CategoriaResiduoInput:
      type: object
      required:
        - nome_categoria_residuos
      properties:
        nome_categoria_residuos:
          type: string
          maxLength: 30
          example: Óleo de Cozinha
    CategoriaResiduo:
      type: object
      properties:
        id:
          type: integer
          example: 4
        nome_categoria_residuos:
          type: string
          example: Óleo de Cozinha
    EnderecoInput:
      type: object
      required:
        - logradouro
        - cep
        - id_cidade
        - numero
      properties:
        logradouro:
          type: string
          maxLength: 50
          example: Rua das Flores
        complemento:
          type: string
          maxLength: 50
          example: Apto 302
        cep:
          type: string
          maxLength: 10
          example: 01310-100
        id_cidade:
          type: integer
          example: 2
        numero:
          type: string
          maxLength: 5
          example: '450'
    Endereco:
      type: object
      properties:
        id:
          type: integer
          example: 3
        logradouro:
          type: string
          example: Rua das Flores
        complemento:
          type: string
          example: Apto 302
        cep:
          type: string
          example: 01310-100
        id_cidade:
          type: integer
          example: 2
        numero:
          type: string
          example: '450'
    CidadeInput:
      type: object
      required:
        - nome_cidade
        - id_estado
      properties:
        nome_cidade:
          type: string
          maxLength: 30
          example: São Paulo
        id_estado:
          type: integer
          example: 1
    Cidade:
      type: object
      properties:
        id:
          type: integer
          example: 2
        nome_cidade:
          type: string
          example: São Paulo
        id_estado:
          type: integer
          example: 1
    EstadoInput:
      type: object
      required:
        - nome_estado
        - sigla
      properties:
        nome_estado:
          type: string
          maxLength: 30
          example: São Paulo
        sigla:
          type: string
          maxLength: 3
          example: SP
    Estado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome_estado:
          type: string
          example: São Paulo
        sigla:
          type: string
          example: SP
security:
  - bearerAuth: []