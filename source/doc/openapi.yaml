openapi: 3.0.3
info:
  title: EcoCycle API
  description: API para controlar o projeto EcoCycle
  version: 1.0.7.26
  contact:
    name: Matheus Henry Dev
    email: 09matheushenry@gmail.com
servers:
  - url: http://localhost:3000
    description: Ambiente de desenvolvimento local
tags:
  - name: Autenticação
    description: Endpoints de login e emissão de token JWT
  - name: Doadores
    description: Cadastro e gerenciamento de usuários do tipo Doador
  - name: Coletores
    description: Cadastro e gerenciamento de usuários do tipo Coletor/Cooperativa
  - name: Pontos de Coleta
    description: Cadastro, listagem e gerenciamento de pontos de coleta de resíduos
  - name: Categorias de Resíduos
    description: Gerenciamento das categorias de resíduos recicláveis
  - name: Endereços
    description: Gerenciamento dos endereços vinculados aos pontos de coleta
  - name: Cidades
    description: Gerenciamento das cidades utilizadas nos endereços
  - name: Estados
    description: Gerenciamento dos estados utilizados nas cidades
paths:
  /v1/ecocycle/auth/login:
    post:
      tags:
        - Autenticação
      summary: Autenticar usuário
      description: Realiza a autenticação de um Doador ou Coletor utilizando e-mail e senha, retornando um token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
            example:
              email: joao.silva@email.com
              senha: SenhaForte123
              tipo_perfil: doador
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/LoginResponse'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.exemplo
                  tipo_perfil: doador
                  usuario:
                    id: 1
                    nome: João da Silva
                    email: joao.silva@email.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ecocycle/doadores:
    post:
      tags:
        - Doadores
      summary: Cadastrar um novo Doador
      description: Cria um novo usuário do tipo Doador informando nome, e-mail e senha.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoadorInput'
            example:
              nome: João da Silva
              email: joao.silva@email.com
              senha: SenhaForte123
      responses:
        '201':
          description: Doador cadastrado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Doador'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 201
                response:
                  id: 1
                  nome: João da Silva
                  email: joao.silva@email.com
                  data_criacao_conta: '2026-07-23'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Doadores
      summary: Listar Doadores
      description: Retorna a lista de usuários do tipo Doador cadastrados.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Lista de doadores retornada com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        type: array
                        items:
                          $ref: '#/components/schemas/Doador'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  - id: 1
                    nome: João da Silva
                    email: joao.silva@email.com
                    data_criacao_conta: '2026-07-23'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ecocycle/doadores/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Identificador único do Doador
        schema:
          type: integer
        example: 1
    get:
      tags:
        - Doadores
      summary: Buscar Doador por ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Doador encontrado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Doador'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 1
                  nome: João da Silva
                  email: joao.silva@email.com
                  data_criacao_conta: '2026-07-23'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
        - Doadores
      summary: Atualizar dados de um Doador
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoadorInput'
            example:
              nome: João da Silva Junior
              email: joao.silva@email.com
              senha: NovaSenhaForte456
      responses:
        '200':
          description: Doador atualizado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        $ref: '#/components/schemas/Doador'
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 1
                  nome: João da Silva Junior
                  email: joao.silva@email.com
                  data_criacao_conta: '2026-07-23'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Doadores
      summary: Remover um Doador
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Doador removido com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelopeBase'
                  - type: object
                    properties:
                      response:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          removido:
                            type: boolean
                            example: true
              example:
                api_description: API para controlar o projeto EcoCycle
                development: Matheus Henry dos Santos
                version: 1.0.7.26
                status: true
                status_code: 200
                response:
                  id: 1
                  removido: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
